<div class="flex h-screen bg-slate-50 overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-64 bg-white border-r border-slate-200 hidden md:flex flex-col">
        <div class="h-16 flex items-center px-6 border-b border-slate-200">
            <div class="flex items-center gap-2 text-primary font-bold text-xl">
                Mediconnect
            </div>
        </div>

        <div class="flex-1 py-6 px-3 space-y-1">
            <button (click)="activeTab = 'today'" [class.active]="activeTab === 'today'"
                class="w-full sidebar-link rounded-lg group">
                <span class="mr-3">📅</span> Today's RDV
            </button>
            <button (click)="activeTab = 'patients'" [class.active]="activeTab === 'patients'"
                class="w-full sidebar-link rounded-lg group">
                <span class="mr-3">👨‍⚕️</span> My Patients
            </button>
        </div>

        <div class="p-4 border-t border-slate-200">
            <button (click)="logout()"
                class="flex items-center w-full px-4 py-2 text-sm font-medium text-slate-600 hover:text-red-600 hover:bg-red-50 rounded-lg transition">
                <span class="mr-2">🚪</span> Sign Out
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <!-- Header -->
        <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8">
            <h2 class="text-xl font-semibold text-slate-800">Doctor Portal</h2>
            <div class="flex items-center gap-4">
                <button (click)="editProfile()" class="text-sm text-primary font-medium hover:underline">Edit
                    Profile</button>
                <div
                    class="w-10 h-10 rounded-full bg-teal-50 flex items-center justify-center text-teal-700 font-bold border-2 border-white shadow-sm">
                    Dr</div>
            </div>
        </header>

        <!-- Content -->
        <div class="flex-1 overflow-y-auto p-8">

            <!-- TODAY TAB -->
            <div *ngIf="activeTab === 'today'" class="animate-fade-in space-y-6">
                <h3 class="text-lg font-bold text-slate-800">Today's Appointments</h3>
                <div *ngIf="todayRdvs.length === 0" class="text-slate-500 italic">No appointments for today.</div>
                <div class="grid gap-4">
                    <div *ngFor="let r of todayRdvs"
                        class="bg-white p-4 rounded-lg shadow-sm border border-slate-200 flex justify-between items-center">
                        <div>
                            <p class="font-bold text-slate-800">Time: {{ r.date | date:'shortTime' }}</p>
                            <p class="text-sm text-slate-600">Patient: {{ getPatientName(r.patientId) }}</p>
                        </div>
                        <button (click)="markAsDone(r)"
                            class="px-4 py-2 rounded bg-teal-100 text-teal-700 hover:bg-teal-200 font-bold text-sm transition flex items-center gap-2">
                            <span>✅</span> Mark as Done
                        </button>
                    </div>
                </div>
            </div>

            <!-- PATIENTS TAB -->
            <div *ngIf="activeTab === 'patients'" class="card animate-fade-in">
                <h3 class="text-lg font-bold text-slate-800 mb-4">Patient List</h3>
                <table class="min-w-full divide-y divide-slate-200">
                    <thead class="bg-teal-50/50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase">Name</th>
                            <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase">Email</th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-slate-200">
                        <tr *ngFor="let p of patients">
                            <td class="px-6 py-4">{{ p.fullName }}</td>
                            <td class="px-6 py-4">{{ p.email }}</td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </main>
</div>
